{% extends "base.html" %}

{% block title %}<title>Halloween Monsters | Teach</title>{% endblock title %}

{% block content %}
    <div class="wrapper">
        {% if monsters %}
        <ul class="carousel">
            {% for monster in monsters %}
            <li class="slide">
                <div class="image-container large">
                    <img src="{{monster.large_img_path}}" />
                </div>
                <p class="slide-name">{{monster.word.capitalize()}}</p>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>There are no monsters here.</p>
        {% endif %}
    </div>
{% endblock content %}
