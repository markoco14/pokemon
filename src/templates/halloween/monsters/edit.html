{% extends "base.html" %}

{% block title %}<title>Halloween Monsters | Edit {{monster.word.capitalize()}}</title>{% endblock title %}

{% block content %}
    <div class="max-w-[800px] mx-auto px-2">
        <section class="mb-4">
            <h1 class="text-2xl underline underline-offset-2">Edit {{monster.word.capitalize()}}</h1>
            <a href="/halloween/monsters/{{monster.word_id}}">Back</a>
            <noscript>Please allow JavaScript to use this form</noscript>
            <form hx-put="/halloween/monsters/{{monster.word_id}}" hx-target="body">
                <div class="form-item">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" value="{{monster.word}}" autocomplete="none"/>
                    <p id="name_error" class="error">{{name_error}}</p>
                </div>
                <div class="form-item">
                    <label for="large_img">Large Image</label>
                    <input id="large_img" name="large_img" type="text" value="{% if monster.large_img_path %}{{monster.large_img_path}}{% endif %}" autocomplete="none"/>
                    <p id="image_error" class="error">{{image_error}}</p>
                </div>
                <button type="submit">Save</button>
            </form>
        </section>
    </div>
{% endblock content %}
